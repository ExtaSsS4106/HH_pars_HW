{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HH Аналитика</title>
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"></script>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">

<nav class="navbar navbar-expand-lg bg-dark" data-bs-theme="dark" style="height: 60px;">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">
      <i class="fas fa-chart-line"></i> HH Аналитика
    </a>
  </div>
</nav>

  <section>
    <div class="statistic">
      <div class="statistic-btns">
        <div class="dropdown w-100" data-bs-theme="dark">
          <button class="btn btn-secondary dropdown-toggle w-100" type="button" id="city" data-bs-toggle="dropdown" aria-expanded="false">
            Все города
          </button>
          <ul class="dropdown-menu w-100" id="cityDropdown">
            <li><a class="dropdown-item" href="#" data-value="all">Все города</a></li>
            {% for city in cities %}
            <li><a class="dropdown-item" href="#" data-value="{{ city }}">{{ city }}</a></li>
            {% endfor %}
          </ul>
        </div>
        <div class="dropdown w-100" data-bs-theme="dark">
          <button class="btn btn-secondary dropdown-toggle w-100" type="button" id="profession" data-bs-toggle="dropdown" aria-expanded="false">
            Все профессии
          </button>
          <ul class="dropdown-menu w-100" id="professionDropdown">
            <li><a class="dropdown-item" href="#" data-value="all">Все профессии</a></li>
            {% for profession in professions %}
            <li><a class="dropdown-item" href="#" data-value="{{ profession }}">{{ profession }}</a></li>
            {% endfor %}
          </ul>
        </div>
      </div>
      <div class="statistic-board">
        <canvas id="myChart"></canvas>
      </div>
    </div>

    <div id="vacancySection" class="vacancions">
      <div id="vacancyContainer" class="w-100 d-flex flex-column align-items-center">
        <div class="card mb-2 bg-dark text-white border-secondary "style="width: 90%;">
          <div class="card-body">
            <p class="placeholder-glow">
              <span class="placeholder" style="width: 75%;"></span>
            </p>
            <p class="placeholder-glow">
              <span class="placeholder" style="width: 25%;"></span>
            </p>
            <p class="placeholder-glow">
              <span class="placeholder"style="width: 25%;"></span>
            </p>
          </div>
        </div>
                <div class="card mb-2 bg-dark text-white border-secondary "style="width: 90%;">
          <div class="card-body">
            <p class="placeholder-glow">
              <span class="placeholder" style="width: 75%;"></span>
            </p>
            <p class="placeholder-glow">
              <span class="placeholder" style="width: 25%;"></span>
            </p>
            <p class="placeholder-glow">
              <span class="placeholder"style="width: 25%;"></span>
            </p>
          </div>
        </div>
                <div class="card mb-2 bg-dark text-white border-secondary "style="width: 90%;">
          <div class="card-body">
            <p class="placeholder-glow">
              <span class="placeholder" style="width: 75%;"></span>
            </p>
            <p class="placeholder-glow">
              <span class="placeholder" style="width: 25%;"></span>
            </p>
            <p class="placeholder-glow">
              <span class="placeholder"style="width: 25%;"></span>
            </p>
          </div>
        </div>
      </div>
      <div id="paginationControls" class="mt-4 " onclick="up();"></div>
    </div>
  </section>
  <script src="{% static 'scripts/main.js' %}"></script>

</body>
</html>
